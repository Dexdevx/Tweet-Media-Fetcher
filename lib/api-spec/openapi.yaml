openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: extract
    description: Tweet media extraction operations
  - name: render
    description: Server-side video rendering operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /extract:
    get:
      operationId: extractMedia
      tags: [extract]
      summary: Extract media from a tweet
      description: Extracts downloadable media (videos/images) from an X/Twitter post URL.
      parameters:
        - name: url
          in: query
          required: true
          description: The X/Twitter post URL to extract media from.
          schema:
            type: string
      responses:
        "200":
          description: Extracted media
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtractResult"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Upstream extraction failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /render-cloudinary:
    post:
      operationId: renderCloudinary
      tags: [render]
      summary: Render a captioned 9:16 video on Cloudinary
      description: >
        Renders the selected video into a 9:16 vertical MP4 with the caption text
        and optional logo burned in, using Cloudinary's CDN. Returns a temporary
        download URL; the uploaded assets are deleted after a few minutes.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RenderCloudinaryRequest"
      responses:
        "200":
          description: Render ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RenderCloudinaryResult"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Cloudinary render failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Cloud rendering is not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /cleanup-cloudinary:
    post:
      operationId: cleanupCloudinary
      tags: [render]
      summary: Immediately delete the temporary Cloudinary assets for a render
      description: >
        Deletes the temporary video + overlay assets created by a cloud render,
        so the user can free them as soon as they finish downloading instead of
        waiting for the automatic expiry. Only assets in the temp folder can be
        deleted.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CleanupCloudinaryRequest"
      responses:
        "200":
          description: Assets deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CleanupCloudinaryResult"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Cloud rendering is not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    MediaItem:
      type: object
      required:
        - url
        - type
      properties:
        url:
          type: string
        quality:
          type: ["string", "null"]
        type:
          type: string
    ExtractResult:
      type: object
      required:
        - title
        - media
        - images
      properties:
        title:
          type: string
        source:
          type: ["string", "null"]
        duration:
          type: ["number", "null"]
        thumbnail:
          type: ["string", "null"]
        media:
          type: array
          items:
            $ref: "#/components/schemas/MediaItem"
        images:
          type: array
          items:
            type: string
    RenderCloudinaryRequest:
      type: object
      required:
        - videoUrl
        - overlayDataUrl
      properties:
        videoUrl:
          type: string
        overlayDataUrl:
          type: string
          description: >
            Base64 PNG data URL of the full-frame (9:16) overlay rendered in the
            browser — caption text and any logo already composited with
            transparency. Burned onto the padded video by Cloudinary as-is.
    RenderCloudinaryResult:
      type: object
      required:
        - downloadUrl
        - expiresInSeconds
        - videoPublicId
        - overlayPublicId
        - cleanupToken
      properties:
        downloadUrl:
          type: string
        expiresInSeconds:
          type: number
        videoPublicId:
          type: string
          description: Cloudinary public ID of the temporary rendered video.
        overlayPublicId:
          type: string
          description: Cloudinary public ID of the temporary overlay image.
        cleanupToken:
          type: string
          description: >
            Signed proof binding these asset IDs to this render. Must be sent back
            to /cleanup-cloudinary so the IDs alone can't be used to delete
            someone else's assets.
    CleanupCloudinaryRequest:
      type: object
      required:
        - videoPublicId
        - overlayPublicId
        - cleanupToken
      properties:
        videoPublicId:
          type: string
        overlayPublicId:
          type: string
        cleanupToken:
          type: string
    CleanupCloudinaryResult:
      type: object
      required:
        - deleted
      properties:
        deleted:
          type: boolean
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
